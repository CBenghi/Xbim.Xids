# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: build

on:
  workflow_dispatch: # Allow running the workflow manually from the GitHub UI
  push:
    branches: [ "main", "preview" ] # Run the workflow when pushing to the main or preview branch
  pull_request:
    branches: [ "*" ] # Run the workflow for all pull requests

jobs:

  build:

    strategy:
      matrix:
        configuration: [Release]

    runs-on: ubuntu-latest  # For a list of available runner types, refer to https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
    - name: Publish
      if: (github.ref == 'refs/heads/main' || (github.ref == 'refs/heads/preview' && github.event_name == 'workflow_dispatch')) && github.event_name != 'pull_request' ## only on main, or manual dispatch on preview
      run: dotnet nuget push **\*.nupkg -s https://api.nuget.org/v3/index.json -k ${{secrets.NUGET_API_KEY}} --skip-duplicate --force-english-output
